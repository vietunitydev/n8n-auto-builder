version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    restart: always
    container_name: n8n_local
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=password123
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n_password
      - N8N_ENDPOINT_WEBHOOK=http://localhost:5678/webhook/
      - N8N_ENDPOINT_WEBHOOK_TEST=http://localhost:5678/webhook-test/
      - GENERIC_TIMEZONE=Asia/Ho_Chi_Minh
      - N8N_LOG_LEVEL=info
      - WEBHOOK_URL=http://localhost:5678/
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/home/node/.n8n/workflows
      - ./credentials:/home/node/.n8n/credentials
    networks:
      - n8n-network

  n8n-mcp:
    image: ghcr.io/czlonkowski/n8n-mcp:latest
    restart: always
    container_name: n8n_mcp_local
    ports:
      - "3001:3001"
    environment:
      - N8N_API_URL=http://n8n_local:5678
      - N8N_API_KEY=${N8N_API_KEY:-placeholder}
      - MCP_MODE=http
      - LOG_LEVEL=info
      - DISABLE_CONSOLE_OUTPUT=false
    depends_on:
      - n8n
    networks:
      - n8n-network

  postgres:
    image: postgres:13
    restart: always
    container_name: n8n_postgres
    environment:
      - POSTGRES_DB=n8n
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=n8n_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U n8n"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - n8n-network

networks:
  n8n-network:
    driver: bridge

volumes:
  n8n_data:
  postgres_data: