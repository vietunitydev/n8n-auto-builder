version: '3.8'

services:
  n8n:
    build:
      context: ./n8n
      dockerfile: Dockerfile
    restart: always
    container_name: n8n_local
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=password123
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n_password
      - N8N_ENDPOINT_WEBHOOK=http://localhost:5678/webhook/
      - N8N_ENDPOINT_WEBHOOK_TEST=http://localhost:5678/webhook-test/
      - GENERIC_TIMEZONE=Asia/Ho_Chi_Minh
      - NODE_ENV=development
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n:/app

  n8n-mcp:
    build:
      context: ./n8n-mcp
      dockerfile: Dockerfile
    restart: always
    container_name: n8n_mcp_local
    ports:
      - "3001:3001"
    environment:
      - N8N_API_URL=http://n8n_local:5678
      - N8N_API_KEY=${N8N_API_KEY}
      - MCP_MODE=http
      - LOG_LEVEL=info
    depends_on:
      - n8n
    volumes:
      - ./n8n-mcp:/app

  postgres:
    image: postgres:13
    restart: always
    container_name: n8n_postgres
    environment:
      - POSTGRES_DB=n8n
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=n8n_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U n8n"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  n8n_data:
  postgres_data: